apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: library
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Use ESO's own service account JWT for IRSA authentication.
      # The service account carries the eks.amazonaws.com/role-arn annotation
      # that maps to the eso_irsa IAM role defined in terraform/eso.tf.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
