apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-catalog-secret
  namespace: library
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: postgres-catalog-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        # RDS managed secret name format: rds!db-<db-instance-identifier>
        key: rds!db-library-system-catalog
        property: password
---
