services:
  postgres-catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_CATALOG_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_CATALOG_DB:-catalog}
    ports:
      - "${POSTGRES_CATALOG_PORT:-5433}:5432"
    volumes:
      - catalog-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-auth}
    ports:
      - "${POSTGRES_AUTH_PORT:-5434}:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

  postgres-reservation:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_RESERVATION_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_RESERVATION_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_RESERVATION_DB:-reservation}
    ports:
      - "${POSTGRES_RESERVATION_PORT:-5435}:5432"
    volumes:
      - reservation-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

  kafka:
    image: apache/kafka:3.9
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - library-net

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    environment:
      DATABASE_URL: "host=postgres-auth port=5432 user=${POSTGRES_AUTH_USER:-postgres} password=${POSTGRES_AUTH_PASSWORD:-postgres} dbname=${POSTGRES_AUTH_DB:-auth} sslmode=disable"
      GRPC_PORT: "50051"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/oauth2/callback}
    ports:
      - "${AUTH_GRPC_PORT:-50051}:50051"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - library-net

  catalog:
    build:
      context: ..
      dockerfile: services/catalog/Dockerfile
    environment:
      DATABASE_URL: "host=postgres-catalog port=5432 user=${POSTGRES_CATALOG_USER:-postgres} password=${POSTGRES_CATALOG_PASSWORD:-postgres} dbname=${POSTGRES_CATALOG_DB:-catalog} sslmode=disable"
      GRPC_PORT: "50052"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
    ports:
      - "${CATALOG_GRPC_PORT:-50052}:50052"
    depends_on:
      postgres-catalog:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - library-net

  reservation:
    build:
      context: ..
      dockerfile: services/reservation/Dockerfile
    environment:
      DATABASE_URL: "host=postgres-reservation port=5432 user=${POSTGRES_RESERVATION_USER:-postgres} password=${POSTGRES_RESERVATION_PASSWORD:-postgres} dbname=${POSTGRES_RESERVATION_DB:-reservation} sslmode=disable"
      GRPC_PORT: "50053"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      CATALOG_GRPC_ADDR: ${CATALOG_GRPC_ADDR:-catalog:50052}
      MAX_ACTIVE_RESERVATIONS: ${MAX_ACTIVE_RESERVATIONS:-5}
    ports:
      - "${RESERVATION_GRPC_PORT:-50053}:50053"
    depends_on:
      postgres-reservation:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - library-net

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key-change-in-production}
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

  search:
    build:
      context: ..
      dockerfile: services/search/Dockerfile
    environment:
      GRPC_PORT: "50054"
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key-change-in-production}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      CATALOG_GRPC_ADDR: ${CATALOG_GRPC_ADDR:-catalog:50052}
    ports:
      - "${SEARCH_GRPC_PORT:-50054}:50054"
    depends_on:
      meilisearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - library-net

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: "8080"
      AUTH_GRPC_ADDR: ${AUTH_GRPC_ADDR:-auth:50051}
      CATALOG_GRPC_ADDR: ${CATALOG_GRPC_ADDR:-catalog:50052}
      RESERVATION_GRPC_ADDR: ${RESERVATION_GRPC_ADDR:-reservation:50053}
      SEARCH_GRPC_ADDR: ${SEARCH_GRPC_ADDR:-search:50054}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - auth
      - catalog
      - reservation
      - search
    networks:
      - library-net

volumes:
  catalog-data:
  auth-data:
  reservation-data:
  meilisearch-data:

networks:
  library-net:
    driver: bridge
