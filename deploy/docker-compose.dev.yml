services:
  catalog:
    build:
      context: ..
      dockerfile: services/catalog/Dockerfile.dev
    volumes:
      - ../services/catalog:/app/services/catalog
      - ../gen:/app/gen

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile.dev
    volumes:
      - ../services/gateway:/app/services/gateway

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile.dev
    volumes:
      - ../services/auth:/app/services/auth
      - ../gen:/app/gen
      - ../pkg/auth:/app/pkg/auth
