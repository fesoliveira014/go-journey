services:
  catalog:
    build:
      context: ..
      dockerfile: services/catalog/Dockerfile.dev
    volumes:
      - ../services/catalog:/app/services/catalog
      - ../gen:/app/gen
      - ../pkg/auth:/app/pkg/auth
      - ../pkg/otel:/app/pkg/otel

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile.dev
    volumes:
      - ../services/gateway:/app/services/gateway
      - ../gen:/app/gen
      - ../pkg/auth:/app/pkg/auth
      - ../pkg/otel:/app/pkg/otel

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile.dev
    volumes:
      - ../services/auth:/app/services/auth
      - ../gen:/app/gen
      - ../pkg/auth:/app/pkg/auth

  reservation:
    build:
      context: ..
      dockerfile: services/reservation/Dockerfile.dev
    volumes:
      - ../services/reservation:/app/services/reservation
      - ../gen:/app/gen
      - ../pkg/auth:/app/pkg/auth
      - ../pkg/otel:/app/pkg/otel

  search:
    build:
      context: ..
      dockerfile: services/search/Dockerfile.dev
    volumes:
      - ../services/search:/app/services/search
      - ../gen:/app/gen
      - ../pkg/auth:/app/pkg/auth
