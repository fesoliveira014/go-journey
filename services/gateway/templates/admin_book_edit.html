{{define "title"}}Edit Book{{end}}
{{define "content"}}
<h1>Edit Book</h1>
{{if .Data.Error}}<p class="form-error">{{.Data.Error}}</p>{{end}}
<form method="POST" action="/admin/books/{{.Data.Id}}" class="auth-form">
    <label for="title">Title</label>
    <input type="text" name="title" id="title" value="{{.Data.Title}}" required>
    <label for="author">Author</label>
    <input type="text" name="author" id="author" value="{{.Data.Author}}" required>
    <label for="isbn">ISBN</label>
    <input type="text" name="isbn" id="isbn" value="{{.Data.Isbn}}" required>
    <label for="genre">Genre</label>
    <input type="text" name="genre" id="genre" value="{{.Data.Genre}}" required>
    <label for="description">Description</label>
    <textarea name="description" id="description">{{.Data.Description}}</textarea>
    <label for="published_year">Published Year</label>
    <input type="number" name="published_year" id="published_year" value="{{.Data.PublishedYear}}" required>
    <label for="total_copies">Total Copies</label>
    <input type="number" name="total_copies" id="total_copies" value="{{.Data.TotalCopies}}" required>
    <button type="submit">Save Changes</button>
</form>
<a href="/books/{{.Data.Id}}">Cancel</a>
{{end}}
