name: Book PDF

# Compiles docs/src into a print-ready PDF (O'Reilly-style cover, copyright
# front matter, table of contents, chapters with rendered mermaid diagrams).
#
# The PDF is a build artifact and is never committed. Every run uploads it as a
# workflow artifact; tag pushes (v*) additionally attach it to the GitHub
# Release.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/book-pdf/**'
      - '.github/workflows/book-pdf.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/book-pdf/**'
      - '.github/workflows/book-pdf.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # 'write' is needed only by the tag-triggered release-attach step below;
    # it is a no-op for branch and pull-request runs.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install WeasyPrint native libraries and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libcairo2 libffi8 shared-mime-info \
            fonts-dejavu fonts-liberation2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli (downloads its own Chromium)
        working-directory: scripts/book-pdf
        run: npm install --no-fund --no-audit

      - name: Install Chromium system dependencies
        working-directory: scripts/book-pdf
        run: npx --yes playwright@1.56.1 install-deps chromium

      - name: Install Python dependencies
        working-directory: scripts/book-pdf
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pypdf

      - name: Build the PDF
        working-directory: scripts/book-pdf
        run: python build_pdf.py --out "$GITHUB_WORKSPACE/dist/building-microservices-in-go.pdf"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: building-microservices-in-go-pdf
          path: dist/building-microservices-in-go.pdf
          if-no-files-found: error

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/building-microservices-in-go.pdf
