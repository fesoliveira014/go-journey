name: Docs PDF

# Compiles the mdBook in docs/ into a single, book-quality PDF: cover, a
# page-numbered table of contents, and LaTeX typography. mdbook-pandoc emits
# LaTeX which Tectonic (XeTeX) turns into the PDF. Because LaTeX can't run
# JavaScript, Mermaid diagrams are pre-rendered to vector PDFs first.
# See docs-pdf/ for the build assets and a local-build recipe.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-pdf/**"
      - ".github/workflows/docs-pdf.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # attach the PDF to a release when triggered by one

env:
  MDBOOK_VERSION: "0.5.3"
  MDBOOK_PANDOC_VERSION: "0.11.1"
  PANDOC_VERSION: "3.10"
  TECTONIC_VERSION: "0.16.9"
  PDF_NAME: "building-microservices-in-go.pdf"

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@${{ env.MDBOOK_VERSION }}

      - name: Install mdbook-pandoc
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-pandoc
          version: ${{ env.MDBOOK_PANDOC_VERSION }}

      - name: Install pandoc
        run: |
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz" -o /tmp/pandoc.tgz
          mkdir -p "$HOME/.local"
          tar xzf /tmp/pandoc.tgz --strip-components=1 -C "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tectonic
        run: |
          curl -fsSL "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/tectonic.tgz
          mkdir -p "$HOME/.local/bin"
          tar xzf /tmp/tectonic.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # DejaVu Sans Mono covers box-drawing glyphs in directory-tree code blocks.
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      # Tectonic downloads its support files on first run; cache them.
      - name: Cache Tectonic bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ env.TECTONIC_VERSION }}

      # mmdc (Mermaid CLI) drives headless Chrome to render diagrams.
      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Install mermaid-cli
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1" # reuse the Chrome installed above
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Assemble and build the PDF
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -euo pipefail
          BUILD="${RUNNER_TEMP}/book"
          cp -r docs "$BUILD"
          cp docs-pdf/book.pandoc.toml "$BUILD/book.toml"
          cp docs-pdf/header.tex "$BUILD/header.tex"

          # Chrome needs --no-sandbox in the CI sandbox.
          printf '{"args":["--no-sandbox","--disable-gpu"]}\n' > "${RUNNER_TEMP}/puppeteer.json"
          export PUPPETEER_CONFIG_FILE="${RUNNER_TEMP}/puppeteer.json"

          python3 docs-pdf/prerender_mermaid.py "$BUILD/src"
          mdbook build "$BUILD"

          test -f "$BUILD/site/pdf/output.pdf"
          mkdir -p dist
          cp "$BUILD/site/pdf/output.pdf" "dist/${PDF_NAME}"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf
          path: dist/${{ env.PDF_NAME }}
          if-no-files-found: error

      - name: Attach PDF to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PDF_NAME }}
