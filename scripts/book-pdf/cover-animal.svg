<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" role="img"
     aria-label="Engraving-style illustration of a gopher">
  <style>
    .ln { fill: none; stroke: #1a1a1a; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .fn { fill: #1a1a1a; }
    .hatch { stroke: #1a1a1a; stroke-width: 0.9; fill: none; opacity: 0.55; }
  </style>

  <!-- ground line -->
  <path class="ln" d="M30 300 H230" />
  <path class="hatch" d="M40 306 l10 6 M70 306 l10 6 M100 306 l10 6 M140 306 l10 6 M180 306 l10 6 M210 306 l10 6" />

  <!-- body (sitting upright) -->
  <path class="ln" d="M95 300
                      C70 300 70 215 80 185
                      C70 150 80 110 130 108
                      C180 110 190 150 180 185
                      C190 215 190 300 165 300 Z" />

  <!-- belly hatching -->
  <path class="hatch" d="M110 230 q20 14 40 0 M108 250 q22 16 44 0 M112 270 q18 12 36 0" />

  <!-- head -->
  <path class="ln" d="M130 108
                      C95 108 82 78 92 56
                      C100 36 118 30 130 30
                      C142 30 160 36 168 56
                      C178 78 165 108 130 108 Z" />

  <!-- ears -->
  <circle class="ln" cx="98" cy="44" r="11" />
  <circle class="ln" cx="162" cy="44" r="11" />
  <circle class="fn" cx="98" cy="44" r="4" />
  <circle class="fn" cx="162" cy="44" r="4" />

  <!-- eyes -->
  <circle class="fn" cx="116" cy="64" r="6" />
  <circle class="fn" cx="144" cy="64" r="6" />
  <circle cx="118" cy="62" r="1.8" fill="#fff" />
  <circle cx="146" cy="62" r="1.8" fill="#fff" />

  <!-- nose + muzzle -->
  <path class="ln" d="M124 80 q6 7 12 0" />
  <ellipse class="fn" cx="130" cy="78" rx="5" ry="3.5" />
  <path class="ln" d="M130 81 V92 M130 92 q-7 4 -12 1 M130 92 q7 4 12 1" />

  <!-- two front teeth -->
  <path class="ln" d="M126 92 v7 M134 92 v7" />

  <!-- whiskers -->
  <path class="hatch" d="M112 80 l-26 -6 M112 86 l-26 4 M148 80 l26 -6 M148 86 l26 4" />

  <!-- little front paws -->
  <path class="ln" d="M120 168 q-10 8 -8 26 M120 168 q10 8 8 26
                      M132 168 q10 8 8 26 M132 168 q-10 8 -8 26" />
  <path class="ln" d="M112 196 q8 8 18 4 M130 200 q8 4 18 -4" />

  <!-- feet -->
  <path class="ln" d="M95 300 q-10 2 -16 -4 M165 300 q10 2 16 -4" />

  <!-- side fur hatching -->
  <path class="hatch" d="M86 170 q-6 30 -4 60 M180 170 q6 30 4 60
                         M84 210 l-10 6 M86 235 l-10 6 M182 210 l10 6 M180 235 l10 6" />
</svg>
